name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # BLOCKING gate. Every PHP file must parse on PHP 8.3 (the Atomic runtime).
  # High-confidence green: the tree already lints clean on 8.3.
  # ---------------------------------------------------------------------------
  php-lint:
    name: PHP syntax lint (8.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: none
      - name: Lint every PHP file
        run: |
          set -euo pipefail
          find theme plugin tools -name '*.php' -print0 \
            | xargs -0 -P8 -n1 -- php -l

  # ---------------------------------------------------------------------------
  # ADVISORY during Phase 2 scaffolding (continue-on-error). The fork inherits
  # ~12K LOC of upstream code, so these surface the full triage list rather than
  # blocking from day one. Flip continue-on-error to false per docs/CI.md once
  # the register / baseline is in place.
  # ---------------------------------------------------------------------------
  coding-standards:
    name: Coding standards + security (PHPCS WordPress-Extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP 8.3 + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPCS
        continue-on-error: true
        run: composer lint -- --report-full --report-checkstyle=phpcs-report.xml
      - name: Upload PHPCS report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phpcs-report
          path: phpcs-report.xml
          if-no-files-found: ignore

  php-compatibility:
    name: PHP 8.3+ compatibility (PHPCompatibility)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP 8.3 + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPCompatibility (testVersion 8.3-)
        continue-on-error: true
        run: composer compat -- --report-full --report-checkstyle=phpcompat-report.xml
      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phpcompat-report
          path: phpcompat-report.xml
          if-no-files-found: ignore

  static-analysis:
    name: Static analysis (PHPStan + WordPress stubs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP 8.3 + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPStan (level 5)
        continue-on-error: true
        run: composer analyse -- --error-format=github
      - name: Generate baseline (commit it later to make this a blocking gate)
        if: always()
        continue-on-error: true
        run: composer analyse:baseline
      - name: Upload PHPStan baseline
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phpstan-baseline
          path: phpstan-baseline.neon
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Accessibility: stand up WordPress (wp-env, PHP 8.3) with the theme + plugin
  # active and scan with axe + HTML_CodeSniffer (pa11y-ci) and Lighthouse. This
  # gates the THEME/PLUGIN template-level a11y (skip link, landmarks, focus,
  # menu ARIA) on a clean install. TTT's content/widget defects (Phase 0 audit)
  # are governed by the content-safety contract, not by this job.
  # Advisory while the harness is proven out.
  # ---------------------------------------------------------------------------
  accessibility:
    name: Accessibility (wp-env + axe/pa11y + Lighthouse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - name: Start wp-env (WordPress + PHP 8.3; theme + plugin mounted)
        run: npx wp-env start
      - name: Activate theme + plugin
        run: |
          npx wp-env run cli wp theme activate braillewright
          npx wp-env run cli wp plugin activate braillewright-pro
      - name: pa11y-ci (WCAG2AA — axe + HTML_CodeSniffer)
        continue-on-error: true
        run: npx pa11y-ci --json > pa11y-report.json
      - name: Lighthouse CI (accessibility category)
        continue-on-error: true
        run: npx lhci autorun
      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-reports
          path: |
            pa11y-report.json
            .lighthouseci/
          if-no-files-found: ignore
      - name: Stop wp-env
        if: always()
        run: npx wp-env stop
